name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12h
  workflow_dispatch:           # manual run
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVG (black & red)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#e50914&color_dots=#1a0000,#5c0a0a,#b20710,#e50914,#ff5a5f
            dist/github-snake.svg?palette=github-dark&color_snake=#e50914&color_dots=#1a0000,#5c0a0a,#b20710,#e50914,#ff5a5f

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
