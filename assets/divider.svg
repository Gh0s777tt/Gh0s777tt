<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 12" width="1000" height="12" fill="none" role="img" aria-label="divider">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e50914" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e50914" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e50914" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff5a5f" stop-opacity="0"/>
      <stop offset="48%" stop-color="#ffd0d2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="52%" stop-color="#ffd0d2" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff5a5f" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-600 0" to="600 0" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="g" x="-5%" y="-400%" width="110%" height="900%"><feGaussianBlur stdDeviation="1.4"/></filter>
  </defs>
  <rect x="0" y="5" width="1000" height="2" fill="url(#base)" filter="url(#g)"/>
  <rect x="0" y="5" width="1000" height="2" fill="url(#sweep)"/>
  <circle cx="500" cy="6" r="2.5" fill="#ff5a5f"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle>
</svg>
